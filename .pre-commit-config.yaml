# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

# Ce fichier configure les hooks pre-commit pour la sécurité et la qualité du code
# Installation : pre-commit install
# Exécution manuelle : pre-commit run --all-files

repos:
  # ============================================================================
  # HOOKS DE BASE - RAPIDES ET ESSENTIELS
  # ============================================================================
  
  # Hooks de base pre-commit
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending

  # ============================================================================
  # HOOKS DE FORMATAGE PYTHON
  # ============================================================================
  
  # Black - Formatage du code Python
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3
        exclude: ^(migrations/|env/|venv/|__pycache__/)

  # isort - Tri des imports
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile', 'black']
        exclude: ^(migrations/|env/|venv/|__pycache__/)

  # ============================================================================
  # HOOKS DE LINTING PYTHON
  # ============================================================================
  
  # Flake8 - Linting Python
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        additional_dependencies: [
          'flake8-docstrings',
          'flake8-comprehensions',
          'flake8-bugbear'
        ]
        exclude: ^(migrations/|env/|venv/|__pycache__/)

  # ============================================================================
  # HOOKS DE SÉCURITÉ PYTHON
  # ============================================================================
  
  # Bandit - Analyse statique de sécurité Python
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml', '-r', '.']
        additional_dependencies: ['bandit[toml]']
        exclude: ^(tests/|migrations/|env/|venv/|__pycache__/|.pytest_cache/)

  # Detect-secrets - Détection de secrets dans le code
  # NOTE: Désactivé temporairement car incompatible avec le fichier .secrets.baseline existant
  # Pour réactiver: supprimer .secrets.baseline et recréer avec `detect-secrets scan > .secrets.baseline`
  # - repo: https://github.com/Yelp/detect-secrets
  #   rev: v1.4.0
  #   hooks:
  #     - id: detect-secrets
  #       args: ['--baseline', '.secrets.baseline']
  #       exclude: ^(tests/|migrations/|env/|venv/|__pycache__/|.pytest_cache/|package-lock\.json|yarn\.lock|poetry\.lock|\.pyc$)

  # Gitleaks - Détection de secrets (rapide et efficace)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.1
    hooks:
      - id: gitleaks
        args: ['protect', '--verbose', '--redact', '--staged']
        stages: [pre-commit]

  # ============================================================================
  # HOOKS SPÉCIFIQUES DJANGO - OPTIONNELS (désactivés pour éviter les timeouts)
  # ============================================================================
  
  # Décommenter ces hooks si nécessaire, mais attention aux performances
  # - repo: local
  #   hooks:
  #     - id: django-check
  #       name: Django Check
  #       entry: python manage.py check
  #       language: system
  #       types: [python]
  #       pass_filenames: false
  #       always_run: false
  #       stages: [pre-push]
  #       
  #     - id: django-check-deploy
  #       name: Django Check Deploy
  #       entry: python manage.py check --deploy
  #       language: system
  #       types: [python]
  #       pass_filenames: false
  #       always_run: false
  #       stages: [pre-push]

  # ============================================================================
  # HOOKS DE SÉCURITÉ AVANCÉE - OPTIONNELS (désactivés pour éviter les timeouts)
  # ============================================================================
  
  # Semgrep - Analyse de sécurité avancée (très lent, à exécuter manuellement)
  # - repo: https://github.com/returntocorp/semgrep
  #   rev: v1.55.1
  #   hooks:
  #     - id: semgrep
  #       args: ['--config', 'p/python', '--config', 'p/django', '--config', 'p/security-audit', '--error', '--jobs', '1']
  #       exclude: ^(tests/|migrations/|env/|venv/|__pycache__/|.pytest_cache/)
  #       stages: [manual]

  # Safety - Vérification des dépendances vulnérables (nécessite un fichier requirements)
  # - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
  #   rev: v1.3.2
  #   hooks:
  #     - id: python-safety-dependencies-check
  #       files: requirements.*\.txt$
  #       args: ['--json']

  # ============================================================================
  # HOOKS DE SÉCURITÉ JAVASCRIPT (si applicable)
  # ============================================================================
  
  # ESLint avec plugin security
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        additional_dependencies:
          - eslint@8.56.0
          - eslint-plugin-security@1.7.1
        files: \.(js|jsx|ts|tsx)$
        types: [file]
        exclude: ^(node_modules/|dist/|build/|static/)
        args: ['--config', '.eslintrc.json']
        stages: [manual]  # Exécuté manuellement pour éviter les timeouts

# Configuration globale
default_language_version:
  python: python3

# Exclusions globales
exclude: |
  (?x)^(
    migrations/|
    env/|
    venv/|
    __pycache__/|
    .pytest_cache/|
    node_modules/|
    dist/|
    build/|
    .git/|
    .tox/|
    .mypy_cache/|
    .*\.pyc$
  )

# Configuration des hooks
fail_fast: false  # Exécuter tous les hooks même si un échoue

# Temps maximum d'exécution pour les hooks (en secondes)
default_stages: [pre-commit, pre-push]
