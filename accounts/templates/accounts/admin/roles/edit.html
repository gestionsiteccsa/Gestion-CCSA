{% extends 'accounts/admin/base_admin.html' %}

{% block admin_content %}
<div class="mb-6">
    <a href="{% url 'accounts:admin_role_list' %}" class="text-sm text-slate-500 hover:text-slate-700">
        ← Retour aux rôles
    </a>
    
    <h1 class="text-2xl font-bold text-slate-800 mt-2">Modifier le rôle</h1>
</div>

<form method="post" class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
    {% csrf_token %}
    
    <div class="space-y-6">
        <!-- Nom -->
        <div>
            <label for="name" class="block text-sm font-medium text-slate-700 mb-1">
                Nom du rôle *
            </label>
            <input type="text" name="name" id="name" required
                   value="{{ role.name }}"
                   class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>
        
        <!-- Description -->
        <div>
            <label for="description" class="block text-sm font-medium text-slate-700 mb-1">
                Description
            </label>
            <textarea name="description" id="description" rows="3"
                      class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">{{ role.description }}</textarea>
        </div>
        
        <!-- Couleur -->
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">
                Couleur
            </label>
            <div class="flex flex-wrap gap-3">
                {% for color_code, color_name in role.COLOR_CHOICES %}
                <label class="cursor-pointer">
                    <input type="radio" name="color" value="{{ color_code }}" 
                           class="sr-only peer" {% if color_code == role.color %}checked{% endif %}>
                    <div class="w-8 h-8 rounded-full border-2 border-transparent peer-checked:border-slate-800 transition-all hover:scale-110"
                         style="background-color: {{ color_code }}"
                         title="{{ color_name }}"></div>
                </label>
                {% endfor %}
            </div>
        </div>
        
        <!-- Options -->
        <div class="space-y-3">
            <div class="flex items-center">
                <input type="checkbox" name="is_default" id="is_default"
                       {% if role.is_default %}checked{% endif %}
                       class="w-4 h-4 text-primary-600 border-slate-300 rounded focus:ring-primary-500">
                <label for="is_default" class="ml-2 text-sm text-slate-700">
                    Rôle par défaut pour les nouveaux utilisateurs
                </label>
            </div>
            
            <div class="flex items-center">
                <input type="checkbox" name="is_active" id="is_active"
                       {% if role.is_active %}checked{% endif %}
                       class="w-4 h-4 text-primary-600 border-slate-300 rounded focus:ring-primary-500">
                <label for="is_active" class="ml-2 text-sm text-slate-700">
                    Rôle actif
                </label>
            </div>
        </div>
    </div>
    
    <div class="mt-8 flex justify-end space-x-3">
        <a href="{% url 'accounts:admin_role_list' %}" 
           class="px-4 py-2 border border-slate-300 rounded-lg text-slate-700 hover:bg-slate-50">
            Annuler
        </a>
        
        <button type="submit" 
                class="px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700">
            Enregistrer les modifications
        </button>
    </div>
</form>
{% endblock %}
